name: 'detinfer Determinism Check'
description: 'Verify ML model outputs are deterministic using detinfer'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  command:
    description: 'Command to run: verify-session, agent, verify'
    required: true
    default: 'verify-session'
  session-file:
    description: 'Path to session JSON file (for verify-session command)'
    required: false
  model:
    description: 'HuggingFace model name (for agent/verify commands)'
    required: false
  prompt:
    description: 'Prompt for non-interactive agent'
    required: false
  seed:
    description: 'Random seed'
    required: false
    default: '42'
  strict:
    description: 'Enable strict verification (check every step)'
    required: false
    default: 'false'
  export:
    description: 'Export session trace to this path'
    required: false
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'

outputs:
  passed:
    description: 'Whether verification passed (true/false)'
    value: ${{ steps.run.outputs.passed }}
  session-hash:
    description: 'Session hash from the run'
    value: ${{ steps.run.outputs.session_hash }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install detinfer
      shell: bash
      run: |
        python -m pip install "${GITHUB_ACTION_PATH}[transformers]"

    - name: Run detinfer
      id: run
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_SESSION_FILE: ${{ inputs.session-file }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_SEED: ${{ inputs.seed }}
        INPUT_STRICT: ${{ inputs.strict }}
        INPUT_EXPORT: ${{ inputs.export }}
      run: |
        set -euo pipefail

        session_hash=""
        command="${INPUT_COMMAND}"

        if [ "$command" = "verify-session" ]; then
          if [ -z "${INPUT_SESSION_FILE}" ]; then
            echo "session-file input is required for verify-session"
            printf 'passed=false\n' >> "$GITHUB_OUTPUT"
            exit 1
          fi
          cmd=(detinfer verify-session "${INPUT_SESSION_FILE}")
          if [ -n "${INPUT_MODEL}" ]; then
            cmd+=(--model "${INPUT_MODEL}")
          fi
          if [ "${INPUT_STRICT}" = "true" ]; then
            cmd+=(--strict)
          fi
          if output="$("${cmd[@]}" 2>&1)"; then
            printf '%s\n' "$output"
            printf 'passed=true\n' >> "$GITHUB_OUTPUT"
            session_hash="$(printf '%s\n' "$output" | awk -F'Session hash: ' '/Session hash:/ {print $2}' | tail -n 1)"
          else
            printf '%s\n' "$output"
            printf 'passed=false\n' >> "$GITHUB_OUTPUT"
            exit 1
          fi

        elif [ "$command" = "agent" ]; then
          if [ -z "${INPUT_MODEL}" ]; then
            echo "model input is required for agent"
            printf 'passed=false\n' >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ -z "${INPUT_PROMPT}" ]; then
            echo "prompt input is required for agent in GitHub Actions"
            printf 'passed=false\n' >> "$GITHUB_OUTPUT"
            exit 1
          fi
          cmd=(detinfer agent "${INPUT_MODEL}" --seed "${INPUT_SEED}")
          if [ -n "${INPUT_PROMPT}" ]; then
            cmd+=(--prompt "${INPUT_PROMPT}")
          fi
          if [ -n "${INPUT_EXPORT}" ]; then
            cmd+=(--export "${INPUT_EXPORT}")
          fi
          if output="$("${cmd[@]}" 2>&1)"; then
            printf '%s\n' "$output"
            printf 'passed=true\n' >> "$GITHUB_OUTPUT"
            session_hash="$(printf '%s\n' "$output" | awk -F'Session hash: ' '/Session hash:/ {print $2}' | tail -n 1)"
          else
            printf '%s\n' "$output"
            printf 'passed=false\n' >> "$GITHUB_OUTPUT"
            exit 1
          fi

        elif [ "$command" = "verify" ]; then
          if [ -z "${INPUT_MODEL}" ]; then
            echo "model input is required for verify"
            printf 'passed=false\n' >> "$GITHUB_OUTPUT"
            exit 1
          fi
          detinfer verify "${INPUT_MODEL}" --seed "${INPUT_SEED}"
          printf 'passed=true\n' >> "$GITHUB_OUTPUT"

        else
          echo "Unknown command: $command"
          exit 1
        fi

        printf 'session_hash=%s\n' "$session_hash" >> "$GITHUB_OUTPUT"